name: Build Windows & Sign

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Private Agents ${{ github.ref_name }}"
          releaseBody: "Download the installer below for your platform."
          releaseDraft: true
          prerelease: false

      - name: Find built exe
        id: find-exe
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          echo "NSIS_PATH=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
          echo "NSIS_NAME=$($nsis.Name)" >> $env:GITHUB_OUTPUT
          echo "Found: $($nsis.FullName)"

      - name: Upload artifact for signing
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: ${{ steps.find-exe.outputs.NSIS_PATH }}

  sign:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned installer
        uses: actions/download-artifact@v4
        with:
          name: unsigned-installer
          path: ./unsigned

      - name: Sign with SignPath API
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          ORG_ID="b2fb627f-2c7b-480c-8921-d99c9ba21f6d"
          API="https://app.signpath.io/API/v1/${ORG_ID}"

          EXE=$(ls ./unsigned/*.exe | head -1)
          EXE_NAME=$(basename "$EXE")
          echo "Signing: $EXE_NAME"

          # Submit signing request
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${API}/SigningRequests" \
            -H "Authorization: Bearer ${SIGNPATH_API_TOKEN}" \
            -F "ProjectSlug=Private_Agents_Desktop" \
            -F "SigningPolicySlug=test-signing" \
            -F "ArtifactConfigurationSlug=initial" \
            -F "Artifact=@${EXE}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Submit response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::SignPath submit failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          REQUEST_ID=$(echo "$BODY" | jq -r '.signingRequestId // .id // empty')
          if [ -z "$REQUEST_ID" ]; then
            echo "::error::Could not extract signing request ID"
            exit 1
          fi
          echo "Signing request ID: $REQUEST_ID"

          # Poll for completion (max 10 min)
          for i in $(seq 1 60); do
            sleep 10
            STATUS_RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${SIGNPATH_API_TOKEN}" \
              "${API}/SigningRequests/${REQUEST_ID}")
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            echo "Status: $STATUS (attempt $i/60)"

            if [ "$STATUS" = "Completed" ]; then
              echo "Signing completed!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Denied" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "::error::Signing failed with status: $STATUS"
              exit 1
            fi
          done

          if [ "$STATUS" != "Completed" ]; then
            echo "::error::Signing timed out"
            exit 1
          fi

          # Download signed artifact
          mkdir -p ./signed
          DOWNLOAD_URL=$(echo "$STATUS_RESPONSE" | jq -r '.signedArtifactLink // empty')
          if [ -z "$DOWNLOAD_URL" ]; then
            DOWNLOAD_URL="${API}/SigningRequests/${REQUEST_ID}/SignedArtifact"
          fi

          curl -s -o "./signed/${EXE_NAME}" \
            -H "Authorization: Bearer ${SIGNPATH_API_TOKEN}" \
            "$DOWNLOAD_URL"

          echo "Downloaded signed artifact: ${EXE_NAME} ($(stat -c%s "./signed/${EXE_NAME}") bytes)"

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-installer
          path: ./signed/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./signed/*.exe
          draft: true
